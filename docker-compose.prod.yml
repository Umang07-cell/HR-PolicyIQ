version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hrplatform
    volumes: [postgres_data:/var/lib/postgresql/data]
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.0
    volumes: [qdrant_data:/qdrant/storage, ./infra/qdrant/config.yaml:/qdrant/config/production.yaml]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes: [./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf]
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/hrplatform
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on: [postgres, qdrant, redis]
    volumes: [uploads_data:/app/uploads]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes: [./infra/nginx/nginx.conf:/etc/nginx/nginx.conf]
    depends_on: [backend]
    restart: unless-stopped

volumes: { postgres_data: {}, qdrant_data: {}, uploads_data: {} }
