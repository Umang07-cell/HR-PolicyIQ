storage:
  storage_path: /qdrant/storage

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334

log_level: INFO

optimizers:
  default_segment_number: 2
  max_segment_size: 200000
  memmap_threshold: 50000
  indexing_threshold: 20000

hnsw_index:
  m: 16
  ef_construct: 100
  full_scan_threshold: 10000
