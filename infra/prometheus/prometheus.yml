global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "hr-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
    metrics_path: /metrics

alerting_rules:
  - name: hr_platform_alerts
    rules:
      - alert: BackendDown
        expr: up{job="hr-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HR Platform backend is down"

      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM P95 latency > 10 seconds"

      - alert: HighAbstainRate
        expr: rate(rag_abstain_total[5m]) / rate(http_requests_total{handler="/chat/"}[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "More than 50% of chat queries are abstaining"
