version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hruser
      POSTGRES_PASSWORD: hrpass
      POSTGRES_DB: hrplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hruser"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.10.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hruser:hrpass@postgres:5432/hrplatform
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "${SECRET_KEY:-change-this-in-production-use-openssl-rand-hex-32}"
      ALLOWED_ORIGINS: '["http://localhost", "http://localhost:80", "http://frontend"]'
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://hruser:hrpass@postgres:5432/hrplatform
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "${SECRET_KEY:-change-this-in-production-use-openssl-rand-hex-32}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
